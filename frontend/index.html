<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>polyGeni</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="logo">⚡ polyGeni</div>
    <div class="header-right">
      <span id="bot-status-badge" class="badge badge-off">BOT OFF</span>
      <button id="btn-start" onclick="startBot(false)">Start (monitor)</button>
      <button id="btn-start-auto" onclick="startBot(true)">Start (auto-trade)</button>
      <button id="btn-stop" onclick="stopBot()">Stop</button>
      <button id="btn-scan" onclick="triggerScan()">Scan Now</button>
    </div>
  </header>

  <main>
    <!-- Portfolio summary row -->
    <section class="cards-row" id="portfolio-cards">
      <div class="card">
        <div class="card-label">Portfolio Value</div>
        <div class="card-value" id="portfolio-value">–</div>
      </div>
      <div class="card">
        <div class="card-label">USDC Balance</div>
        <div class="card-value" id="balance">–</div>
      </div>
      <div class="card">
        <div class="card-label">In Positions</div>
        <div class="card-value" id="invested">–</div>
      </div>
      <div class="card">
        <div class="card-label">Total P&L</div>
        <div class="card-value" id="total-pnl">–</div>
      </div>
      <div class="card">
        <div class="card-label">Unrealized P&L</div>
        <div class="card-value" id="unrealized-pnl">–</div>
      </div>
      <div class="card">
        <div class="card-label">Win Rate</div>
        <div class="card-value" id="win-rate">–</div>
      </div>
    </section>

    <div class="layout-with-thinking">
      <!-- Main content area -->
      <div class="main-content">
        <div class="two-col">
          <!-- Opportunities -->
          <section class="panel">
            <h2>Live Opportunities <span class="tag" id="opp-count"></span></h2>
            <div id="opportunities-list" class="scroll-list"></div>
          </section>

          <!-- Positions -->
          <section class="panel">
            <h2>Open Positions</h2>
            <div id="positions-list" class="scroll-list"></div>
          </section>
        </div>

        <!-- Analytics: chart + gauge -->
        <section class="panel analytics-row">
          <div class="chart-block">
            <div class="analytics-header">
              <h2>Portfolio Value</h2>
              <div class="period-toggle">
                <button class="period-btn active" onclick="setPeriod('hourly',this)">Hourly</button>
                <button class="period-btn" onclick="setPeriod('daily',this)">Daily</button>
              </div>
            </div>
            <canvas id="portfolio-chart" height="130"></canvas>
          </div>
          <div class="gauge-block">
            <h2>Strategy Meter</h2>
            <div class="gauge-wrap">
              <svg class="gauge-svg" viewBox="0 0 200 120">
                <!-- Background arc -->
                <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#2a2a30" stroke-width="18" stroke-linecap="round"/>
                <!-- Colored arc -->
                <path id="gauge-arc" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#7f5af0" stroke-width="18" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251"/>
                <!-- Needle -->
                <line id="gauge-needle" x1="100" y1="100" x2="100" y2="30" stroke="#fffffe" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="5" fill="#fffffe"/>
                <!-- Labels -->
                <text x="14" y="118" fill="#72757e" font-size="9">Safe</text>
                <text x="160" y="118" fill="#72757e" font-size="9">Bold</text>
              </svg>
              <div class="gauge-score" id="gauge-score">–</div>
              <div class="gauge-label" id="gauge-label">–</div>
            </div>
            <div class="gauge-stats" id="gauge-stats"></div>
          </div>
        </section>

        <!-- Trades -->
        <section class="panel">
          <h2>Trade History</h2>
          <div id="trades-list" class="scroll-list"></div>
        </section>
      </div>

      <!-- Thinking sidebar -->
      <aside class="thinking-panel">
        <div class="thinking-header">
          <h2>Bot Thinking</h2>
          <span class="tag" id="cycle-badge">Cycle #0</span>
        </div>

        <!-- Goal progress -->
        <div class="goal-block">
          <div class="goal-label">
            <span>Goal Progress</span>
            <span id="goal-amounts">$13.25 → $30.00</span>
          </div>
          <div class="goal-bar">
            <div class="goal-fill" id="goal-fill" style="width:0%"></div>
          </div>
          <div class="goal-pct" id="goal-pct">0%</div>
        </div>

        <!-- Decision log -->
        <div id="thinking-log" class="thinking-log"></div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
